spring.application.name=springboot-rest-api
logging.pattern.level=%5p [correlationId:%X{correlationId:-}]

server.port=8080
server.address=0.0.0.0

spring.flyway.enabled=true

management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.layout=BaseLayout

info.app.name=Spring Boot REST API
info.app.description=Spring Boot REST API with products, validation, persistence, OpenAPI, and Actuator.
info.app.version=1.0.0
