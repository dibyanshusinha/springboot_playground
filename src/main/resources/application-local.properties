# Local developer machine. Start PostgreSQL with: docker compose up -d postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:product_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:product_password}
spring.datasource.driver-class-name=org.postgresql.Driver

management.endpoints.web.exposure.include=health,info,metrics,env,beans

logging.level.com.dibyanshusinha=DEBUG
logging.level.org.springframework.jdbc=DEBUG

spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin-password}
spring.security.user.roles=ADMIN
